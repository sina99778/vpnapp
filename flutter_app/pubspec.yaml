name: secure_vpn
description: Zero-trust freemium VPN client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management (see lib/app/ for rationale).
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking + transport security.
  dio: ^5.6.0

  # Cryptography — pure Dart, no native blob to strip during obfuscation.
  cryptography: ^2.9.0

  # Synchronous SHA-256 for the TLS pinning callback (validateCertificate is sync).
  crypto: ^3.0.3

  # Secrets at rest (Keychain / EncryptedSharedPreferences).
  flutter_secure_storage: ^9.2.2

  # Ads (Server-Side Verification).
  google_mobile_ads: ^9.0.0

  # Misc.
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

# ---------------------------------------------------------------------------
# Obfuscation note: release builds MUST be compiled with
#   flutter build apk   --obfuscate --split-debug-info=build/symbols
#   flutter build ipa   --obfuscate --split-debug-info=build/symbols
# Keep the symbol files — they are required to symbolicate crash traces.
# String literals (channel names, URLs) are NOT hidden by --obfuscate;
# transport security relies on SSL pinning + payload encryption, never on
# hiding strings. See core/config/app_config.dart.
# ---------------------------------------------------------------------------
